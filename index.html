
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts Feed Demo</title>
<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}
#slides{
height:100vh;
transition:transform .3s ease;
}
.slide{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000;
position:relative;
}
iframe,video{
width:100%;
height:100%;
object-fit:cover;
border:0;
}
.info{
position:absolute;
bottom:20px;
left:20px;
right:90px;
}
.title{font-size:22px;font-weight:bold;margin-bottom:6px;}
.caption{font-size:14px;color:#ccc;}
.actions{
position:absolute;
right:10px;
bottom:100px;
display:flex;
flex-direction:column;
gap:10px;
}
.btn{
width:50px;height:50px;border-radius:50%;
background:#222;border:1px solid #444;
display:flex;align-items:center;justify-content:center;
cursor:pointer;font-size:20px;
}
.counter{
position:absolute;
top:10px;right:10px;
background:#222;padding:6px 10px;border-radius:20px;
font-size:13px;
}
</style>
</head>
<body>

<div id="slides"></div>
<div class="counter" id="counter"></div>

<div class="actions">
<div class="btn" onclick="like()">❤</div>
<div class="btn" onclick="share()">↗</div>
<div class="btn" onclick="openSource()">⤴</div>
</div>

<script>

const videos=[
{
title:"YouTube Short",
caption:"User added YouTube Shorts video",
type:"youtube",
url:"https://youtube.com/shorts/Ay6qLrxWyWs"
},
{
title:"Direct MP4 Sample",
caption:"HTML5 video example",
type:"mp4",
url:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
}
];

let index=0;

function extractYouTubeID(url){
try{
let u=new URL(url);

if(u.pathname.startsWith("/shorts/")){
return u.pathname.split("/shorts/")[1];
}

if(u.hostname.includes("youtu.be")){
return u.pathname.slice(1);
}

return u.searchParams.get("v");
}catch{
return null;
}
}

function render(){
const slides=document.getElementById("slides");
slides.innerHTML="";

videos.forEach(v=>{

let media="";

if(v.type==="youtube"){

let id=extractYouTubeID(v.url);

media=`<iframe 
src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&mute=1&playsinline=1&controls=1&rel=0"
allow="autoplay; encrypted-media; picture-in-picture"
allowfullscreen>
</iframe>`;

}else{

media=`<video src="${v.url}" autoplay muted loop playsinline></video>`;

}

slides.innerHTML+=`
<div class="slide">
${media}
<div class="info">
<div class="title">${v.title}</div>
<div class="caption">${v.caption}</div>
</div>
</div>`;

});

update();

}

function update(){
document.getElementById("slides").style.transform=`translateY(-${index*100}vh)`;
document.getElementById("counter").innerText=(index+1)+" / "+videos.length;
}

function next(){
if(index<videos.length-1){
index++;
update();
}
}

function prev(){
if(index>0){
index--;
update();
}
}

function like(){
alert("Liked!");
}

function share(){
alert("Share link: "+videos[index].url);
}

function openSource(){
window.open(videos[index].url,"_blank");
}

let startY=0;

window.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY;
});

window.addEventListener("touchend",e=>{

let endY=e.changedTouches[0].clientY;

if(startY-endY>50) next();
if(endY-startY>50) prev();

});

window.addEventListener("keydown",e=>{

if(e.key==="ArrowDown") next();
if(e.key==="ArrowUp") prev();

});

render();

</script>

</body>
</html>
