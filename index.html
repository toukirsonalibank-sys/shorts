<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tool Launcher</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,120px);
gap:20px;
padding:20px;
}

.tile{
width:120px;
height:120px;
background:#1e1e1e;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:16px;
cursor:pointer;
transition:.2s;
user-select:none;
}

.tile:hover{
background:#333;
transform:scale(1.05);
}

.tile:active{
transform:scale(.95);
}

</style>
</head>

<body>

<div class="grid">

<div class="tile" onclick="openPage('shorts.html')">
Shorts
</div>

<div class="tile" onclick="openPage('tool1.html')">
Tool 1
</div>

<div class="tile" onclick="openPage('tool2.html')">
Tool 2
</div>

<div class="tile" onclick="openPage('tool3.html')">
Tool 3
</div>

</div>

<script>

function openPage(page){
window.location.href = page;
}

</script>

</body>
</html>
