<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Pop the Balloons (Fixed Sound)</title>
</head>
<body>
<script>
let soundOn = true;
let voices = [];
let speechUnlocked = false;

function loadVoices() {
  if (!("speechSynthesis" in window)) return;
  voices = window.speechSynthesis.getVoices();
}

if ("speechSynthesis" in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text) {
  if (!soundOn || !("speechSynthesis" in window) || !speechUnlocked) return;

  try {
    window.speechSynthesis.cancel();

    if (!voices.length) {
      voices = window.speechSynthesis.getVoices();
    }

    const u = new SpeechSynthesisUtterance(text);

    const preferredVoice =
      voices.find(v => v.lang === "en-US") ||
      voices.find(v => v.lang === "en-GB") ||
      voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en")) ||
      null;

    if (preferredVoice) {
      u.voice = preferredVoice;
    }

    u.rate = 0.88;
    u.pitch = 1.12;
    u.volume = 0.95;

    window.speechSynthesis.speak(u);
  } catch (e) {}
}

document.addEventListener("pointerdown", function unlockSpeechOnce() {
  speechUnlocked = true;

  if ("speechSynthesis" in window) {
    try {
      const silent = new SpeechSynthesisUtterance("");
      silent.volume = 0;
      window.speechSynthesis.speak(silent);
      window.speechSynthesis.cancel();
    } catch (e) {}
  }

  document.removeEventListener("pointerdown", unlockSpeechOnce);
}, { once: true });

// Demo call
setTimeout(()=>speak("Balloon"), 1000);
</script>

<h1 style="text-align:center;margin-top:40vh;">Tap to Enable Sound 🎈</h1>
</body>
</html>
